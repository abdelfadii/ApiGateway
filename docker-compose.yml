version: "3.9"

services:

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sirmaroc-gateway
    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      ASPNETCORE_ENVIRONMENT: Production

      # Redis (if you use it)
      ConnectionStrings__Redis: redis:6379

      # JWT config
      Jwt__Issuer: SirmarocAuthService
      Jwt__Audience: SirmarocGateway
      Jwt__SecretKey: "${JWT_SECRET_KEY}"

      # Microservices base URLs (IMPORTANT: use container names)
      Services__Auth__BaseUrl: http://auth-service:80
      Services__Accommodation__BaseUrl: http://accommodation-service:80
      Services__Transport__BaseUrl: http://transport-service:80
      Services__Matches__BaseUrl: http://matches-service:80
      Services__Tourism__BaseUrl: http://tourism-service:80
      Services__Chatbot__BaseUrl: http://chatbot-service:80
      Services__Community__BaseUrl: http://community-service:80

      # CORS
      Cors__AllowedOrigins__0: http://localhost:3000

    networks:
      - sirmaroc-net

    depends_on:
      - redis

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: sirmaroc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sirmaroc-net

networks:
  sirmaroc-net:
    driver: bridge